version: '3.8'

services:
  scraper-heavy:
    build:
      context: ./scrapers-playwright
      dockerfile: Dockerfile.heavy
    container_name: scraper-heavy-v2
    restart: unless-stopped
    ports:
      - "${HEAVY_PORT}:8081"
    environment:
      - PORT=8081
      - SCRAPER_TYPE=heavy
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1.5G
    networks:
      - fabrica_fabrica-net

  scraper-nano:
    build:
      context: ./scrapers-playwright
      dockerfile: Dockerfile.nano
    container_name: scraper-nano-v2
    restart: unless-stopped
    ports:
      - "${NANO_PORT}:8080"
    environment:
      - PORT=8080
      - SCRAPER_TYPE=nano
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks:
      - fabrica_fabrica-net

  scraper-maps:
    build:
      context: ./scrapers-playwright
      dockerfile: Dockerfile.maps
    container_name: scraper-maps-v1
    restart: unless-stopped
    ports:
      - "${MAPS_PORT}:8082"
    environment:
      - PORT=8082
      - SCRAPER_TYPE=maps
      - MAPS_TIMEOUT=45000
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    networks:
      - fabrica_fabrica-net

  postgres-db-v2:
    image: postgres:15-alpine
    container_name: postgres-monitor-v2
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./pgdata_v2:/var/lib/postgresql/data
    networks:
      - fabrica_fabrica-net

networks:
  fabrica_fabrica-net:
    external: true
