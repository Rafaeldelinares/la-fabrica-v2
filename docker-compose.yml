services:
  traefik:
    image: traefik:v2.10
    container_name: fabrica-traefik
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
      - "--providers.docker.exposedbydefault=false"
    networks:
      - fabrica-net
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    container_name: fabrica-n8n
    environment:
      - N8N_HOST=n8n.ia-bybusiness.online
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://n8n.ia-bybusiness.online/
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=fabrica
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - N8N_SECURE_COOKIE=false
      # CORS: permitir peticiones desde los frontends locales de desarrollo
      - N8N_CORS_ALLOWED_ORIGINS=http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:3000
    ports:
      - "5678:5678"
    volumes:
      - ./data/n8n:/home/node/.n8n
    depends_on:
      - postgres
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n.rule=Host(`n8n.localhost`) || Host(`n8n.ia-bybusiness.online`)"
      - "traefik.http.routers.n8n.entrypoints=web"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"
    networks:
      - fabrica-net
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: config-postgres-1
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=fabrica
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - fabrica-net
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: fabrica-pgadmin
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD}
    depends_on:
      - postgres
    networks:
      - fabrica-net
    restart: no

  frontend:
    image: node:20
    container_name: fabrica-frontend
    working_dir: /app
    volumes:
      - ../core/www:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`fabrica.localhost`) || Host(`crm.localhost`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.services.frontend.loadbalancer.server.port=5173"
    networks:
      - fabrica-net
    restart: no

  whatsapp:
    image: devlikeapro/waha
    container_name: fabrica-whatsapp
    ports:
      - "3030:3000"
    environment:
      - WHATSAPP_DEFAULT_SESSION=default
      - WHATSAPP_API_KEY=fabrica
      - WAHA_API_KEY=fabrica
      - WAHA_DASHBOARD_NO_PASSWORD=True
    networks:
      - fabrica-net
    restart: no

networks:
  fabrica-net:
    driver: bridge
